name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GIT_FTP_VERSION: "1.6.0"
  LFTP_VERSION: "4.9.3"

jobs:
  macos:
    name: macOS ${{ matrix.name }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: arm64
            target: aarch64-apple-darwin
          - name: intel
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install macOS dependencies
        run: |
          brew update
          brew install lftp

      - name: Prepare bundled tools
        run: |
          bash scripts/prepare-git-ftp.sh src-tauri "$GIT_FTP_VERSION"
          bash scripts/prepare-lftp-unix.sh src-tauri "${{ matrix.target }}" "$LFTP_VERSION"

      - name: Determine macOS signing readiness
        id: macos_signing_ready
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -n "$APPLE_CERTIFICATE" && -n "$APPLE_CERTIFICATE_PASSWORD" && -n "$KEYCHAIN_PASSWORD" && -n "$APPLE_SIGNING_IDENTITY" && -n "$APPLE_ID" && -n "$APPLE_PASSWORD" && -n "$APPLE_TEAM_ID" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Apple signing certificate
        id: import_apple_certificate
        if: ${{ steps.macos_signing_ready.outputs.ready == 'true' }}
        continue-on-error: true
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Install app dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build signed macOS bundle
        if: ${{ steps.macos_signing_ready.outputs.ready == 'true' && steps.import_apple_certificate.outcome == 'success' }}
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri build -- --target "${{ matrix.target }}"

      - name: Build ad-hoc signed macOS bundle
        if: ${{ steps.macos_signing_ready.outputs.ready != 'true' || steps.import_apple_certificate.outcome != 'success' }}
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: npm run tauri build -- --target "${{ matrix.target }}"

      - name: Upload macOS artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  windows:
    name: Windows ${{ matrix.name }}
    runs-on: windows-latest
    env:
      WINDOWS_CERTIFICATE_PFX: ${{ secrets.WINDOWS_CERTIFICATE_PFX }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x64
            target: x86_64-pc-windows-msvc
          - name: arm64
            target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MSYS
          install: >-
            lftp

      - name: Prepare bundled tools
        shell: msys2 {0}
        run: |
          bash scripts/prepare-git-ftp.sh src-tauri "$GIT_FTP_VERSION"
          bash scripts/prepare-lftp-windows.sh src-tauri "${{ matrix.target }}" /usr/bin "$LFTP_VERSION"

      - name: Install app dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Windows bundle
        run: npm run tauri build -- --target "${{ matrix.target }}"

      - name: Sign Windows artifacts
        if: ${{ env.WINDOWS_CERTIFICATE_PFX != '' }}
        shell: pwsh
        continue-on-error: true
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX))
          Get-ChildItem "src-tauri/target/${{ matrix.target }}/release/bundle" -Recurse -Include *.exe,*.msi | ForEach-Object {
            signtool sign /f $certPath /p $env:WINDOWS_CERTIFICATE_PASSWORD /fd sha256 /tr http://timestamp.digicert.com /td sha256 $_.FullName
          }

      - name: Upload Windows artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

  linux-ubuntu-x64:
    name: Linux ubuntu x64
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y curl file git build-essential libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf lftp ca-certificates xz-utils
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          . "$HOME/.cargo/env"
          rustup target add x86_64-unknown-linux-gnu
      - name: Build
        run: |
          . "$HOME/.cargo/env"
          bash scripts/prepare-git-ftp.sh src-tauri "$GIT_FTP_VERSION"
          bash scripts/prepare-lftp-unix.sh src-tauri x86_64-unknown-linux-gnu "$LFTP_VERSION"
          npm ci
          npm run build
          npm run tauri build -- --bundles deb --target x86_64-unknown-linux-gnu
      - uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb

  linux-debian-x64:
    name: Linux debian x64
    runs-on: ubuntu-latest
    container: debian:12
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y curl file git build-essential libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf lftp ca-certificates xz-utils
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          . "$HOME/.cargo/env"
          rustup target add x86_64-unknown-linux-gnu
      - name: Build
        run: |
          . "$HOME/.cargo/env"
          bash scripts/prepare-git-ftp.sh src-tauri "$GIT_FTP_VERSION"
          bash scripts/prepare-lftp-unix.sh src-tauri x86_64-unknown-linux-gnu "$LFTP_VERSION"
          npm ci
          npm run build
          npm run tauri build -- --bundles deb --target x86_64-unknown-linux-gnu
      - uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb

  linux-fedora-x64:
    name: Linux fedora x64
    runs-on: ubuntu-latest
    container: fedora:41
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          dnf install -y curl file git gcc gcc-c++ make webkit2gtk4.1-devel libappindicator-gtk3 librsvg2-devel patchelf lftp nodejs npm tar xz
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          . "$HOME/.cargo/env"
          rustup target add x86_64-unknown-linux-gnu
      - name: Build
        run: |
          . "$HOME/.cargo/env"
          bash scripts/prepare-git-ftp.sh src-tauri "$GIT_FTP_VERSION"
          bash scripts/prepare-lftp-unix.sh src-tauri x86_64-unknown-linux-gnu "$LFTP_VERSION"
          npm ci
          npm run build
          npm run tauri build -- --bundles rpm --target x86_64-unknown-linux-gnu
      - uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm

  linux-ubuntu-arm64:
    name: Linux ubuntu arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: uraimo/run-on-arch-action@v3.0.1
        with:
          arch: aarch64
          distro: ubuntu24.04
          githubToken: ${{ github.token }}
          dockerRunArgs: --volume "${PWD}:/workspace"
          env: |
            GIT_FTP_VERSION: ${{ env.GIT_FTP_VERSION }}
            LFTP_VERSION: ${{ env.LFTP_VERSION }}
          install: |
            apt-get update
            apt-get install -y curl file git build-essential libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf lftp ca-certificates xz-utils
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -y nodejs
            curl https://sh.rustup.rs -sSf | sh -s -- -y
          run: |
            cd /workspace
            . "$HOME/.cargo/env"
            rustup target add aarch64-unknown-linux-gnu
            bash scripts/prepare-git-ftp.sh src-tauri "$GIT_FTP_VERSION"
            bash scripts/prepare-lftp-unix.sh src-tauri aarch64-unknown-linux-gnu "$LFTP_VERSION"
            npm ci
            npm run build
            npm run tauri build -- --bundles deb --target aarch64-unknown-linux-gnu
      - uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb

  linux-debian-arm64:
    name: Linux debian arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: uraimo/run-on-arch-action@v3.0.1
        with:
          arch: aarch64
          distro: bookworm
          githubToken: ${{ github.token }}
          dockerRunArgs: --volume "${PWD}:/workspace"
          env: |
            GIT_FTP_VERSION: ${{ env.GIT_FTP_VERSION }}
            LFTP_VERSION: ${{ env.LFTP_VERSION }}
          install: |
            apt-get update
            apt-get install -y curl file git build-essential libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf lftp ca-certificates xz-utils
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -y nodejs
            curl https://sh.rustup.rs -sSf | sh -s -- -y
          run: |
            cd /workspace
            . "$HOME/.cargo/env"
            rustup target add aarch64-unknown-linux-gnu
            bash scripts/prepare-git-ftp.sh src-tauri "$GIT_FTP_VERSION"
            bash scripts/prepare-lftp-unix.sh src-tauri aarch64-unknown-linux-gnu "$LFTP_VERSION"
            npm ci
            npm run build
            npm run tauri build -- --bundles deb --target aarch64-unknown-linux-gnu
      - uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb

  linux-fedora-arm64:
    name: Linux fedora arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: uraimo/run-on-arch-action@v3.0.1
        with:
          arch: aarch64
          distro: fedora_latest
          githubToken: ${{ github.token }}
          dockerRunArgs: --volume "${PWD}:/workspace"
          env: |
            GIT_FTP_VERSION: ${{ env.GIT_FTP_VERSION }}
            LFTP_VERSION: ${{ env.LFTP_VERSION }}
          install: |
            dnf install -y curl file git gcc gcc-c++ make webkit2gtk4.1-devel libappindicator-gtk3 librsvg2-devel patchelf lftp nodejs npm tar xz
            curl https://sh.rustup.rs -sSf | sh -s -- -y
          run: |
            cd /workspace
            . "$HOME/.cargo/env"
            rustup target add aarch64-unknown-linux-gnu
            bash scripts/prepare-git-ftp.sh src-tauri "$GIT_FTP_VERSION"
            bash scripts/prepare-lftp-unix.sh src-tauri aarch64-unknown-linux-gnu "$LFTP_VERSION"
            npm ci
            npm run build
            npm run tauri build -- --bundles rpm --target aarch64-unknown-linux-gnu
      - uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/rpm/*.rpm
